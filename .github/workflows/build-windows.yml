name: Build Windows Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Get dependencies
        run: flutter pub get

      - name: Cache mpv library
        uses: actions/cache@v4
        with:
          path: build/windows/x64/mpv-dev*
          key: mpv-lib-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            mpv-lib-${{ runner.os }}-
      
      - name: Build Windows release (with retry)
        shell: pwsh
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "=== Build attempt $i of $maxRetries ==="
            try {
              flutter build windows --release
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Build succeeded on attempt $i"
                exit 0
              }
            } catch {
              Write-Host "Build attempt $i failed: $_"
            }
            if ($i -lt $maxRetries) {
              Write-Host "Waiting 30 seconds before retry..."
              Start-Sleep -Seconds 30
            }
          }
          Write-Host "Build failed after $maxRetries attempts"
          exit 1
      
      - name: Create ZIP archive
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $zipName = "ai-studio-$version-windows.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
      
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
